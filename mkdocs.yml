site_name: Healthcare AI Contact Center Platform
site_description: Solution & Technical Design Document for Agentic Call Workflow Engine
site_author: Sapna Utage
copyright: Copyright &copy; 2026

theme:
  name: material
  palette:
    scheme: default
    primary: blue
    accent: cyan
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Business Context:
    - Overview: business-context/overview.md
    - Industry Challenges: business-context/challenges.md
    - Problem Statement: business-context/problem-statement.md
    - Design Inputs: business-context/design-inputs.md
    - Platform Goals: business-context/platform-goals.md
  - Architecture:
    - Overview: architecture/overview.md
    - Solution Options: architecture/solution-options.md
    - Competitive Differentiation: architecture/competitive-differentiation.md
    - High-Level Architecture: architecture/high-level.md
    - Runtime Architecture: architecture/runtime.md
    - Graph Design: architecture/graph-design.md
  - Workflow:
    - End-to-End Workflow: workflow/e2e-workflow.md
    - Step-by-Step Breakdown: workflow/steps.md
  - Component Design:
    - Coordinator Node: components/coordinator.md
    - Claims Agent: components/claims-agent.md
    - Benefits Agent: components/benefits-agent.md
    - Appointment Scheduler: components/appointment-agent.md
    - General Responder: components/general-responder.md
  - State Management:
    - State Schema: state/schema.md
    - Checkpointing: state/checkpointing.md
  - Human-in-the-Loop:
    - HITL Design: hitl/design.md
    - Trigger Conditions: hitl/triggers.md
  - API Reference: api-reference.md
  - Infrastructure:
    - Azure Services: infrastructure/azure-services.md
    - Observability: infrastructure/observability.md
  - Security & Compliance:
    - Security: security/overview.md
    - HIPAA Alignment: security/hipaa.md
  - Deployment: deployment.md
  - Design Decisions: design-decisions.md
  - Roadmap: roadmap.md
  - Glossary: glossary.md

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.tasklist
  - tables
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

plugins:
  - search
