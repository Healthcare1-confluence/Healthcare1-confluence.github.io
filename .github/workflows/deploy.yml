name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs==1.6.1
          pip install mkdocs-material==9.7.6
          pip install mkdocs-material-extensions==1.3.1

      - name: Build documentation
        run: |
          cd project
          mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./project/site
          cname: healthcare1-confluence.github.io
          external_repository: Healthcare1-confluence/Healthcare1-confluence.github.io
          publish_branch: gh-pages
